<svg width="680" height="590" viewBox="0 0 680 590" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitetura do pipeline híbrido de alfabetização</title>
<desc>Fluxo: Base dos Dados -> Ingestão batch/streaming -> Bronze -> Silver -> Gold -> Athena/Power BI</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="200" y="30" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#2C2C2A">Base dos Dados (BigQuery)</text>

<rect x="170" y="114" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="255" y="134" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#042C53">Ingestão batch</text>
<text x="255" y="152" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">Dados históricos</text>

<rect x="360" y="114" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="445" y="134" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#04342C">Streaming</text>
<text x="445" y="152" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Eventos simulados</text>

<rect x="200" y="210" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="230" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#4A1B0C">Bronze layer</text>
<text x="340" y="248" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Dados brutos em Parquet</text>

<rect x="200" y="306" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="326" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#2C2C2A">Silver layer</text>
<text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Limpeza e integração (PySpark)</text>

<rect x="200" y="402" width="280" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="422" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#412402">Gold layer</text>
<text x="340" y="440" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">Datasets analíticos prontos</text>

<rect x="170" y="498" width="170" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="255" y="520" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#26215C">Athena</text>

<rect x="360" y="498" width="170" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="445" y="520" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" fill="#26215C">Power BI</text>

<line x1="300" y1="74" x2="255" y2="112" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="380" y1="74" x2="445" y2="112" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="255" y1="170" x2="310" y2="208" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="445" y1="170" x2="380" y2="208" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="266" x2="340" y2="304" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="362" x2="340" y2="400" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="310" y1="458" x2="255" y2="496" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="380" y1="458" x2="445" y2="496" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
</svg>
